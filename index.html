   GLOBAL STYLES
═══════════════════════════════════════════════════════════════════ */

const GS = ({ theme }) => {
  const t = THEMES[theme] || THEMES.cosmic;
  useEffect(() => {
    // Set favicon
    let link = document.querySelector("link[rel~='icon']");
    if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
    link.href = APP_ICON_URI;
    link.type = 'image/svg+xml';
    // Set title
    document.title = 'Triad';
  }, []);
  return (
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap');
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: ${t.bg}; }
      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-thumb { background: ${t.accent}44; border-radius: 2px; }
      .root {
        font-family: 'Outfit', sans-serif;
        background: ${t.bg};
        height: 100dvh;
        max-width: 430px;
        margin: 0 auto;
        color: ${t.text};
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .orb1 {
        position: fixed; top: -80px; left: -60px;
        width: 280px; height: 280px; border-radius: 50%;
        background: radial-gradient(circle, ${t.accent}28 0%, transparent 70%);
        pointer-events: none; z-index: 0;
        animation: orb1 10s ease-in-out infinite alternate;
      }
      .orb2 {
        position: fixed; bottom: 60px; right: -40px;
        width: 240px; height: 240px; border-radius: 50%;
        background: radial-gradient(circle, ${t.accent2}1e 0%, transparent 70%);
        pointer-events: none; z-index: 0;
        animation: orb2 13s ease-in-out infinite alternate;
      }
      @keyframes orb1 { from{transform:translate(0,0) scale(1)} to{transform:translate(30px,25px) scale(1.1)} }
      @keyframes orb2 { from{transform:translate(0,0)} to{transform:translate(-20px,-18px) scale(1.12)} }
      .page { position: relative; z-index: 1; padding-bottom: 96px; }
      .glass {
        background: ${t.glass};
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border: 1px solid ${t.border};
        border-radius: 18px;
      }
      .glass2 {
        background: ${t.glass2};
        backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        border: 1px solid ${t.border2};
        border-radius: 20px;
      }
      .hcard { transition: transform .18s ease, box-shadow .18s ease; }
      .hcard:hover { transform: translateY(-2px); box-shadow: 0 10px 36px rgba(0,0,0,0.3); }
      .bp { transition: transform .1s ease; }
      .bp:active { transform: scale(0.91); }
      .logbtn { transition: all .18s ease; }
      .logbtn:hover:not(:disabled) { transform: scale(1.1); }
      .logbtn:active:not(:disabled) { transform: scale(0.88); }

      /* ── PAGE ENTER ANIMATION ── */
      @keyframes pageEnter {
        from { opacity:0; transform: translateY(18px) scale(0.98); }
        to   { opacity:1; transform: translateY(0)    scale(1); }
      }
      .page { animation: pageEnter .32s cubic-bezier(.22,1,.36,1) forwards; }

      /* ── SLIDE UP ── */
      @keyframes slideUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
      .su { animation: slideUp .28s ease forwards; }

      /* ── SLIDE IN FROM RIGHT ── */
      @keyframes slideRight { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
      .sr { animation: slideRight .26s cubic-bezier(.22,1,.36,1) forwards; }

      /* ── STAGGER ── */
      .stagger>* { opacity:0; animation: slideUp .28s ease forwards; }
      .stagger>*:nth-child(1){animation-delay:.04s}.stagger>*:nth-child(2){animation-delay:.08s}
      .stagger>*:nth-child(3){animation-delay:.12s}.stagger>*:nth-child(4){animation-delay:.16s}
      .stagger>*:nth-child(5){animation-delay:.20s}.stagger>*:nth-child(6){animation-delay:.24s}
      .stagger>*:nth-child(7){animation-delay:.28s}.stagger>*:nth-child(8){animation-delay:.32s}

      /* ── TOAST ── */
      @keyframes toastIn {
        from { opacity:0; transform:translateX(-50%) translateY(-12px) scale(0.9); }
        to   { opacity:1; transform:translateX(-50%) translateY(0)     scale(1); }
      }
      @keyframes toastOut {
        from { opacity:1; transform:translateX(-50%) translateY(0)  scale(1); }
        to   { opacity:0; transform:translateX(-50%) translateY(-8px) scale(0.95); }
      }
      .toast-in  { animation: toastIn  .22s cubic-bezier(.34,1.3,.64,1) forwards; }
      .toast-out { animation: toastOut .18s ease forwards; }

      /* ── SHEET ── */
      @keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
      .sheet { animation: sheetUp .28s cubic-bezier(.34,1.26,.64,1); }

      /* ── POP IN (achievement unlock) ── */
      @keyframes popIn {
        0%   { opacity:0; transform:scale(0.4) rotate(-8deg); }
        60%  { opacity:1; transform:scale(1.18) rotate(3deg); }
        80%  { transform:scale(0.95) rotate(-1deg); }
        100% { opacity:1; transform:scale(1) rotate(0deg); }
      }
      .pop-in { animation: popIn .55s cubic-bezier(.34,1.56,.64,1) forwards; }

      /* ── ACHIEVEMENT GLOW PULSE ── */
      @keyframes achGlow {
        0%,100% { box-shadow: 0 0 10px ${t.accent}44; }
        50%      { box-shadow: 0 0 28px ${t.accent}99, 0 0 60px ${t.accent}33; }
      }
      .ach-unlocked { animation: achGlow 2.4s ease-in-out infinite; }

      /* ── PULSE ── */
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
      .pulse { animation: pulse 1.6s ease-in-out infinite; }

      /* ── SPIN ── */
      @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
      .spin { animation: spin 1s linear infinite; }

      /* ── HABIT LOG RIPPLE ── */
      @keyframes ripple {
        0%   { transform:scale(1);   opacity:1; }
        100% { transform:scale(2.4); opacity:0; }
      }
      .ripple { animation: ripple .45s ease-out forwards; }

      /* ── FLOAT ── */
      @keyframes float {
        0%,100% { transform: translateY(0); }
        50%      { transform: translateY(-5px); }
      }
      .float { animation: float 3s ease-in-out infinite; }

      /* ── NUMBER COUNT UP ── */
      @keyframes countUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
      .count-up { animation: countUp .4s ease forwards; }

      /* ── SHINE SWEEP ── */
      @keyframes shine {
        0%   { background-position: -200% center; }
        100% { background-position:  200% center; }
      }

      /* ── SCALE IN (for modals/sheets) ── */
      @keyframes scaleIn {
        from { opacity:0; transform:scale(0.94); }
        to   { opacity:1; transform:scale(1); }
      }
      .scale-in { animation: scaleIn .2s cubic-bezier(.22,1,.36,1) forwards; }

      /* ── PROGRESS BAR FILL ANIMATION ── */
      @keyframes fillBar { from{width:0%} }
      .fill-bar { animation: fillBar .8s cubic-bezier(.4,0,.2,1) forwards; }

      /* ── BOUNCE IN (for check/completion) ── */
      @keyframes bounceIn {
        0%   { transform:scale(0); }
        55%  { transform:scale(1.25); }
        80%  { transform:scale(0.92); }
        100% { transform:scale(1); }
      }
      .bounce-in { animation: bounceIn .4s cubic-bezier(.34,1.56,.64,1) forwards; }

      /* ── GLOW BREATHE (active streak cards) ── */
      @keyframes glowBreathe {
        0%,100% { box-shadow: 0 0 8px ${t.accent}22; }
        50% { box-shadow: 0 0 22px ${t.accent}55, 0 4px 20px rgba(0,0,0,0.3); }
      }
      .streak-glow { animation: glowBreathe 2.8s ease-in-out infinite; }

      input:focus, select:focus, textarea:focus { outline: none; border-color: ${t.accent}66 !important; box-shadow: 0 0 0 3px ${t.accent}14 !important; }
      select option { background: ${t.surface}; color: ${t.text}; }
      .tab-active { background: ${t.accent}22; color: ${t.accent}; border-color: ${t.accent}44; }

      /* ── HABIT CARD LOG DONE FLASH ── */
      @keyframes doneFlash {
        0%   { background: ${t.glass}; }
        40%  { background: ${t.accent}22; }
        100% { background: ${t.glass}; }
      }
      .done-flash { animation: doneFlash .5s ease; }

      /* ── NAV ACTIVE TAB BOUNCE ── */
      @keyframes navBounce {
        0%,100% { transform: translateY(0); }
        40%      { transform: translateY(-4px); }
      }
      .nav-active { animation: navBounce .3s ease; }
    `}</style>
  );
};

/* ═══════════════════════════════════════════════════════════════════
   HOOKS & UTILS
═══════════════════════════════════════════════════════════════════ */
function useLS(k, init) {
  const [v, sv] = useState(() => {
    try {
      const s = localStorage.getItem(k);
      if (!s) return typeof init === "function" ? init() : init;
      const parsed = JSON.parse(s);
      // Basic type guard: if init is array, parsed must be array; if object, must be object
      const initVal = typeof init === "function" ? init() : init;
      if (Array.isArray(initVal) && !Array.isArray(parsed)) return initVal;
      if (initVal !== null && typeof initVal === "object" && !Array.isArray(initVal) && (typeof parsed !== "object" || Array.isArray(parsed) || parsed === null)) return initVal;
      return parsed;
    } catch { return typeof init === "function" ? init() : init; }
  });
  useEffect(() => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }, [k, v]);
  return [v, sv];
}

function LineChart({ data, color, height=80, label="", showDots=true }) {
  if (!data || data.length < 2) return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,0.2)",fontSize:12}}>No data</div>;
  const w=300, h=height, pad=8;
  const max=Math.max(...data,1), min=0;
  const pts=data.map((v,i)=>({
    x:pad+(i/(data.length-1))*(w-pad*2),
    y:h-pad-(v-min)/(max-min||1)*(h-pad*2)
  }));
  const pathD="M "+pts.map(p=>`${p.x},${p.y}`).join(" L ");
  const areaD=pathD+` L ${pts[pts.length-1].x},${h} L ${pts[0].x},${h} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height,display:"block"}}>
      <defs>
        <linearGradient id={`lg${color.replace("#","")}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.35"/>
          <stop offset="100%" stopColor={color} stopOpacity="0.02"/>
        </linearGradient>
      </defs>
      <path d={areaD} fill={`url(#lg${color.replace("#","")})`}/>
      <path d={pathD} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
        style={{filter:`drop-shadow(0 0 4px ${color}88)`}}/>
      {showDots && pts.map((p,i)=>(
        <circle key={i} cx={p.x} cy={p.y} r="3" fill={color} style={{filter:`drop-shadow(0 0 3px ${color})`}}/>
      ))}
    </svg>
  );
}

function BarChart({ data, colors, maxVal, height=100, labels }) {
  if (!data || !data.length) return null;
  const w=300, h=height, pad=4;
  const max=maxVal||Math.max(...data,1);
  const bw=(w-pad*(data.length+1))/data.length;
  return (
    <svg viewBox={`0 0 ${w} ${h+20}`} style={{width:"100%",display:"block"}}>
      {data.map((v,i)=>{
        const bh=Math.max((v/max)*(h-8),2);
        const x=pad+(i*(bw+pad));
        const y=h-bh;
        const col=Array.isArray(colors)?colors[i%colors.length]:colors;
        return (
          <g key={i}>
            <rect x={x} y={y} width={bw} height={bh} rx="4" fill={col} opacity="0.85"
              style={{filter:`drop-shadow(0 0 6px ${col}55)`}}/>
            {labels && <text x={x+bw/2} y={h+14} textAnchor="middle" fill="rgba(120,120,160,0.7)" fontSize="8">{labels[i]}</text>}
          </g>
        );
      })}
    </svg>
  );
}

function DonutChart({ segments, size=120 }) {
  const total=segments.reduce((s,x)=>s+x.value,0)||1;
  let offset=0;
  const r=46, circ=2*Math.PI*r, cx=60, cy=60, sw=14;
  return (
    <svg width={size} height={size} viewBox="0 0 120 120">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth={sw}/>
      {segments.map((seg,i)=>{
        const pct=seg.value/total;
        const dash=pct*circ, gap=circ-dash;
        const el=(
          <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={seg.color} strokeWidth={sw}
            strokeDasharray={`${dash} ${gap}`} strokeDashoffset={-offset}
            strokeLinecap="round" transform="rotate(-90 60 60)"
            style={{filter:`drop-shadow(0 0 5px ${seg.color}88)`,transition:"stroke-dasharray .6s ease"}}/>
        );
        offset+=dash;
        return el;
      })}
    </svg>
  );
}

function HeatmapGrid({ data, color, days=28 }) {
  const weeks=Math.ceil(days/7);
  const max=Math.max(...Object.values(data),1);
  const allDays=Array.from({length:days},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(days-1-i));
    return d.toISOString().slice(0,10);
  });
  return (
    <div style={{display:"grid",gridTemplateColumns:`repeat(${weeks},1fr)`,gap:3}}>
      {Array.from({length:weeks}).map((_,wi)=>(
        <div key={wi} style={{display:"flex",flexDirection:"column",gap:3}}>
          {allDays.slice(wi*7,(wi+1)*7).map((d,di)=>{
            const v=data[d]||0;
            const op=v>0?Math.max(0.2,v/max):0.06;
            return <div key={di} title={`${d}: ${v}`} style={{width:"100%",aspectRatio:"1",borderRadius:3,background:v>0?color:`rgba(255,255,255,0.06)`,opacity:v>0?op:0.06,transition:"opacity .3s"}}/>;
          })}
        </div>
      ))}
    </div>
  );
}

function RadarChart({ axes, values, color, size=140 }) {
  const n=axes.length, cx=size/2, cy=size/2, r=size/2-20;
  const angle=i=>(i/n)*2*Math.PI - Math.PI/2;
  const pts=values.map((v,i)=>({
    x:cx+r*(v/100)*Math.cos(angle(i)),
    y:cy+r*(v/100)*Math.sin(angle(i)),
  }));
  const outer=axes.map((_,i)=>({x:cx+r*Math.cos(angle(i)),y:cy+r*Math.sin(angle(i))}));
  const gridLevels=[0.25,0.5,0.75,1];
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {gridLevels.map(l=>(
        <polygon key={l} points={axes.map((_,i)=>`${cx+r*l*Math.cos(angle(i))},${cy+r*l*Math.sin(angle(i))}`).join(" ")}
          fill="none" stroke="rgba(128,128,168,0.15)" strokeWidth="1"/>
      ))}
      {outer.map((p,i)=><line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="rgba(128,128,168,0.15)" strokeWidth="1"/>)}
      <polygon points={pts.map(p=>`${p.x},${p.y}`).join(" ")} fill={`${color}30`} stroke={color} strokeWidth="1.5"
        style={{filter:`drop-shadow(0 0 6px ${color}66)`}}/>
      {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="3" fill={color}/>)}
      {outer.map((p,i)=><text key={i} x={p.x+(p.x>cx?6:-6)} y={p.y+(p.y>cy?6:-6)} textAnchor={p.x>cx?"start":"end"} fill="rgba(128,128,168,0.7)" fontSize="8">{axes[i]}</text>)}
    </svg>
  );
}

function Ring({pct,size=56,sw=5,color="#a78bfa",bg="rgba(255,255,255,0.07)"}) {

    <svg width={size} height={size} style={{transform:"rotate(-90deg)",display:"block"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={bg} strokeWidth={sw}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
        strokeDasharray={`${dash} ${circ-dash}`} strokeLinecap="round"
        style={{transition:"stroke-dasharray .7s cubic-bezier(.4,0,.2,1)",filter:`drop-shadow(0 0 5px ${color}88)`}}/>
    </svg>
  );
}

function Tag({children,color}) {
  return <span style={{fontSize:10,fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase",padding:"3px 8px",borderRadius:20,background:`${color}18`,color,border:`1px solid ${color}28`}}>{children}</span>;

function Stat({label,value,color,sub,mutedColor="rgba(160,160,180,0.6)"}) {

        case"e500":      prog=expCount; break;
        case"np7":       prog=expCount; break;
        case"np15":      prog=expCount; break;

        case"savingsguru":prog=savingsExp; break;
        case"xpre6":     prog=savingsExp; break;
        case"xw3":       prog=savingsExp; break;
        // HABITS meta
        case"h4":        prog=habCats; break;
        case"h6":        prog=habCats; break;
        case"allcat":    prog=habCats; break;
        case"nc4":       prog=habCats; break;
        case"hab5":      prog=habCount; break;
        case"hab10":     prog=habCount; break;
        case"nb6":       prog=habWithReminder; break;
        case"ns18":      prog=[...new Set(habits.filter(h=>["fitness","learning","mindfulness"].includes(h.category)).map(h=>h.category))].length; break;
        // CATEGORY DEPTH
        case"hlt10":     case"ncat1":   prog=hltLogs; break;
        case"hlt50":     case"ncat5":   prog=hltLogs; break;
        case"hlt200":    case"ncat9":   prog=hltLogs; break;
        case"fit10":     case"ncat2":   prog=fitLogs; break;
        case"fit50":     case"ncat6":   prog=fitLogs; break;
        case"fit200":    case"ncat10":  prog=fitLogs; break;
        case"lrn10":     case"ncat3":   prog=lrnLogs; break;
        case"lrn50":     case"ncat7":   prog=lrnLogs; break;
        case"ncat11":    prog=lrnLogs; break;
        case"mnd10":     case"ncat4":   prog=mndLogs; break;
        case"mnd50":     case"ncat8":   prog=mndLogs; break;
        case"mnd200":    case"ncat12":  prog=mndLogs; break;
        case"ncat13":    prog=wrkLogs; break;
        case"ncat14":    case"ncat18":  prog=crtLogs; break;
        case"ncat15":    prog=socLogs; break;
        case"ncat16":    prog=finLogs; break;
        case"ncat17":    prog=wrkLogs; break;
        // FITNESS/HEALTH for power
        case"xpre1":     prog=fitLogs+hltLogs; break;
        case"xp1":       prog=fitLogs+hltLogs; break;
        // WISDOM compound
        case"xv2":       prog=mndLogs; break; // secondary check in unlock below
        case"xv3":       prog=moodStreak; break;
        // SPECIAL
        case"nc9":       prog=Math.max(...last30Days().map(d=>habits.reduce((s,h)=>s+(h.logs[d]||0),0)),0)>=10?1:0; break;
        case"nc15":      prog=habits.some(h=>!HABIT_CATS.includes(h.category)&&(Object.values(h.logs).reduce((a,v)=>a+v,0))>0)?1:0; break;
        default:         prog=a.progress; break;
      }
      prog=Math.min(prog,a.target);
      // Special compound unlock conditions
      let unlocked=a.unlocked;
      if(!unlocked){
        switch(a.id){
          case"xv2":   unlocked=mndLogs>=500&&focusSessions>=200; break;
          case"xv3":   unlocked=moodStreak>=500&&journalCount>=200&&lrnStreak>=100; break;
          case"xw3":   unlocked=savingsExp>=200&&expCount>=500; break;
          default:     unlocked=prog>=a.target; break;
        }
      }
      if(prog!==a.progress||unlocked!==a.unlocked){
        if(unlocked&&!a.unlocked&&!toastedAch.current.has(a.id)){
          toastedAch.current.add(a.id);
          setTimeout(()=>showToast(`🏆 Achievement unlocked: ${a.title}!`),400);
        }
        return{...a,progress:prog,unlocked};
      }
      return a;
    }));

  /* ── FOCUS TIMER ────────────────────────────────────────────── */
  function FocusTimer() {
    const [running,setRunning]=useState(false);
    const [timeLeft,setTimeLeft]=useState((focus.duration||25)*60);
    const [dur,setDur]=useState(focus.duration||25);
    const ref=useRef(null);

    // sessions come from persistent focus state
    const sessions=focus.sessions||[];

    useEffect(()=>{
      if(running){
        ref.current=setInterval(()=>{
          setTimeLeft(t=>{
            if(t<=1){
              setRunning(false);
              clearInterval(ref.current);
              const newSession={date:todayISO(),duration:dur,completed:true};
              setFocus(f=>({...f,sessions:[...(f.sessions||[]),newSession]}));
              showToast(`🎉 Focus session complete! (${dur} min)`);
              return dur*60;
            }
            return t-1;
          });
        },1000);
      } else clearInterval(ref.current);
      return()=>clearInterval(ref.current);
    // eslint-disable-next-line
    },[running,dur]);

    const mm=Math.floor(timeLeft/60).toString().padStart(2,"0");
    const ss=(timeLeft%60).toString().padStart(2,"0");
    const pct=Math.round((1-timeLeft/(dur*60))*100);
    const todaySessions=sessions.filter(s=>s.date===todayISO());

    return(
      <div className="page stagger">
        <div style={{padding:"24px 20px 16px"}}>
          <div style={{fontSize:fs+7,fontWeight:900,letterSpacing:"-0.04em",color:T.text}}>Focus ⏱️</div>
          <div style={{fontSize:fs-2,color:T.muted,marginTop:3}}>Deep work sessions</div>
        </div>
        <div style={{padding:"0 20px"}}>
          <div className="glass2" style={{padding:28,borderRadius:24,textAlign:"center",background:`linear-gradient(135deg,${T.accent}14,${T.accent2}0a)`,border:`1px solid ${T.accent}22`,marginBottom:12}}>
            <div style={{position:"relative",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:20}}>
              <Ring pct={pct} size={160} sw={8} color={running?T.accent2:T.accent}/>
              <div style={{position:"absolute",textAlign:"center"}}>
                <div style={{fontSize:36,fontWeight:900,letterSpacing:"-0.04em",color:T.text,fontVariantNumeric:"tabular-nums"}}>{mm}:{ss}</div>
                <div style={{fontSize:fs-2,color:T.muted,marginTop:2}}>{running?"Focus time":"Ready"}</div>
              </div>
            </div>
            {/* Duration selector */}
            <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:20}}>
              {[5,10,15,25,30,45,60].map(d=>(
                <button key={d} onClick={()=>{if(!running){setDur(d);setTimeLeft(d*60);setFocus(f=>({...f,duration:d}));} }} className="bp" style={{padding:"5px 10px",borderRadius:9,background:dur===d?`${T.accent}28`:T.glass,border:`1px solid ${dur===d?T.accent+"55":T.border}`,color:dur===d?T.accent:T.muted,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'Outfit',sans-serif",transition:"all .18s"}}>
                  {d}m
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button onClick={()=>setRunning(r=>!r)} className="bp" style={{padding:"12px 28px",borderRadius:14,background:`linear-gradient(135deg,${T.accent},${T.accent}bb)`,border:"none",color:"#000",fontWeight:800,fontSize:fs,cursor:"pointer"}}>
                {running?"⏸ Pause":"▶ Start"}
              </button>
              <button onClick={()=>{setRunning(false);setTimeLeft(dur*60);}} className="bp glass" style={{padding:"12px 18px",borderRadius:14,border:`1px solid ${T.border}`,color:T.muted,fontWeight:600,fontSize:fs,cursor:"pointer",background:T.glass}}>
                ↺ Reset
              </button>
            </div>
          </div>
          {/* Today's sessions */}
          <div className="glass" style={{padding:16,borderRadius:18,marginBottom:10}}>
            <div style={{fontSize:10,color:T.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Today's Sessions</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
              <Stat label="Sessions" value={todaySessions.length} color={T.accent} mutedColor={T.muted}/>
              <Stat label="Minutes" value={todaySessions.reduce((s,x)=>s+x.duration,0)} color={T.accent2} mutedColor={T.muted}/>
              <Stat label="Total" value={sessions.length} color={T.accent3} mutedColor={T.muted}/>
            </div>
            {todaySessions.length===0&&<div style={{textAlign:"center",color:T.muted,fontSize:fs-1,padding:"10px 0"}}>No sessions today yet</div>}
            {sessions.slice(-5).reverse().map((s,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:`1px solid ${T.border}`,fontSize:fs-1}}>
                <span style={{color:T.muted}}>{fmtDate(s.date)}</span>
                <span style={{color:T.accent,fontWeight:700}}>{s.duration} min ✓</span>
              </div>
            ))}
          </div>
          {/* Streak chart */}
          {sessions.length>1&&(
            <div className="glass" style={{padding:16,borderRadius:18}}>
              <div style={{fontSize:10,color:T.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Focus Minutes (7 days)</div>
              <LineChart data={last7Days().map(d=>sessions.filter(s=>s.date===d).reduce((s,x)=>s+x.duration,0))} color={T.accent2} height={60}/>
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ── JOURNAL ────────────────────────────────────────────────── */
  function Journal() {
    const [text,setText]=useState("");
    const [mood,setMoodL]=useState(3);
    const [editId,setEditId]=useState(null);

    const save=()=>{
      if(!text.trim())return;
      if(editId){
        setJournal(prev=>prev.map(j=>j.id===editId?{...j,text,mood,date:todayISO()}:j));
        setEditId(null);showToast("Updated ✏️");
      } else {
        setJournal(prev=>[{id:Date.now(),text,mood,date:todayISO()},...prev]);
        showToast("Saved 📝");
      }
      setText("");setMoodL(3);
    };
    const startEdit=(j)=>{setText(j.text);setMoodL(j.mood);setEditId(j.id);};

    return(
      <div className="page stagger">
        <div style={{padding:"24px 20px 16px"}}>
          <div style={{fontSize:fs+7,fontWeight:900,letterSpacing:"-0.04em",color:T.text}}>Journal 📝</div>
          <div style={{fontSize:fs-2,color:T.muted,marginTop:3}}>Reflect & grow</div>
        </div>
        <div style={{padding:"0 20px"}}>
          <div className="glass" style={{padding:16,borderRadius:18,marginBottom:12}}>
            <div style={{fontSize:10,color:T.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>{editId?"Editing Entry":"New Entry"} · {new Date().toLocaleDateString("en-IN",{day:"numeric",month:"short"})}</div>
            <div style={{display:"flex",gap:6,marginBottom:10}}>
              {MOOD_OPTS.map(m=>(
                <button key={m.v} onClick={()=>setMoodL(m.v)} className="bp" style={{flex:1,padding:"6px 0",borderRadius:9,border:`1.5px solid ${mood===m.v?T.accent:"transparent"}`,background:mood===m.v?`${T.accent}22`:T.glass,cursor:"pointer",fontSize:18,display:"flex",justifyContent:"center",transition:"all .18s"}}>
                  {m.e}
                </button>
              ))}
            </div>
            <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="How was your day? What habits went well? What can you improve?..." style={{...inp,minHeight:100,resize:"vertical",lineHeight:1.6,padding:"10px 13px"}}/>
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button onClick={save} className="bp" style={{flex:1,padding:"10px",borderRadius:12,background:`linear-gradient(135deg,${T.accent},${T.accent}bb)`,border:"none",color:"#000",fontWeight:700,fontSize:fs-1,cursor:"pointer"}}>{editId?"Update":"Save Entry"}</button>
              {editId&&<button onClick={()=>{setEditId(null);setText("");setMoodL(3);}} className="bp glass" style={{padding:"10px 14px",borderRadius:12,border:`1px solid ${T.border}`,color:T.muted,cursor:"pointer",fontSize:fs-1,fontWeight:600,background:T.glass}}>Cancel</button>}
            </div>
          </div>
          {journal.length===0&&<div className="glass" style={{padding:24,textAlign:"center",color:T.muted,borderRadius:18,fontSize:fs-1}}>No journal entries yet. Start writing!</div>}
          {journal.map(j=>{
            const mo=MOOD_OPTS.find(m=>m.v===j.mood);
            return(
              <div key={j.id} className="glass" style={{padding:14,borderRadius:16,marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:18}}>{mo?.e}</span>
                    <span style={{fontSize:fs-2,color:T.muted}}>{fmtDate(j.date)}</span>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>startEdit(j)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13}}>✏️</button>
                    <button onClick={()=>{setJournal(prev=>prev.filter(x=>x.id!==j.id));showToast("Deleted");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:T.muted}}>✕</button>
                  </div>
                </div>
                <div style={{fontSize:fs-1,color:T.text,lineHeight:1.6,opacity:0.85}}>{j.text}</div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  /* ── GOALS ──────────────────────────────────────────────────── */
  function Goals() {
    const[showF,setShowF]=useState(false);
    const[form,setForm]=useState({title:"",pillar:"power",target:10,current:0,unit:"times"});

      if(!form.title)return;
      setGoals(prev=>[...prev,{...form,id:Date.now(),target:Number(form.target),current:Number(form.current)}]);
      setForm({title:"",pillar:"power",target:10,current:0,unit:"times"});setShowF(false);showToast("Goal added 🎯");
    };
    const bump=(id,d)=>setGoals(prev=>prev.map(g=>g.id===id?{...g,current:Math.max(0,Math.min(g.current+d,g.target))}:g));

      <div className="page stagger">

            </div>
          </div>

        {["power","wealth","wisdom"].map(pillar=>{

          const P=PILLARS[pillar];
          return(
            <div key={pillar} style={{padding:"0 20px 10px"}}>
              <div style={{fontSize:10,fontWeight:700,color:P.glow,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:8,display:"flex",alignItems:"center",gap:5}}>{P.icon} {P.label} Goals</div>

                  <div key={g.id} className="glass" style={{padding:13,borderRadius:16,marginBottom:7}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontWeight:600,fontSize:fs}}>{g.title}</span>
                      <button onClick={()=>setGoals(prev=>prev.filter(x=>x.id!==g.id))} style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:13}}>✕</button>

                    <div style={{display:"flex",alignItems:"center",gap:10,marginTop:9}}>
                      <div style={{flex:1}}>
                        <div style={{height:5,background:T.glass,borderRadius:3,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${P.glow}88,${P.glow})`,borderRadius:3,transition:"width .5s",boxShadow:`0 0 7px ${P.glow}66`}}/>
                        </div>
                        <div style={{fontSize:10,color:T.muted,marginTop:3}}>{g.current}/{g.target} {g.unit} · {pct}%</div>
                      </div>
                      <div style={{display:"flex",gap:5}}>
                        {[-1,1].map(d=>(
                          <button key={d} onClick={()=>bump(g.id,d)} className="bp" style={{width:28,height:28,borderRadius:8,background:d>0?`${P.glow}20`:T.glass,border:`1px solid ${d>0?P.glow+"44":T.border}`,cursor:"pointer",color:d>0?P.glow:T.muted,fontWeight:800,fontSize:15,fontFamily:"'Outfit',sans-serif"}}>

                          </button>
                        ))}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    );
  }

                          <div style={{flex:1,minWidth:0}}>

                              {!a.unlocked&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:10,background:"rgba(244,63,94,0.15)",color:"#f43f5e",fontWeight:700,letterSpacing:"0.04em"}}>LEGENDARY</span>}

                            <div style={{fontSize:11,color:T.text,lineHeight:1.6,fontStyle:"italic"}}>{a.lore}</div>

                  {/* Rarity glow on unlock */}

                  <div style={{fontSize:30,lineHeight:1,marginBottom:7}} className={a.unlocked?"pop-in":undefined}>{a.unlocked?a.icon:"🔒"}</div>

                  <div style={{marginBottom:5}}>
                    <span style={{fontSize:8,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",padding:"2px 6px",borderRadius:6,background:`${RM.color}18`,color:RM.color,border:`1px solid ${RM.color}30`}}>
                      {RM.label}
                    </span>
                  </div>

                  <div style={{fontWeight:700,fontSize:fs-1,color:a.unlocked?RM.color:T.text,lineHeight:1.25,marginBottom:3}}>{a.title}</div>
                  <div style={{fontSize:9,color:T.muted,lineHeight:1.4,marginBottom:8}}>{a.desc}</div>

                  {/* Progress bar */}
                  <div style={{height:3,background:T.glass,borderRadius:2,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${prog}%`,background:`linear-gradient(90deg,${RM.color}66,${RM.color})`,borderRadius:2,transition:"width .5s"}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
                    <span style={{fontSize:8,color:T.muted}}>{a.progress.toLocaleString()}/{a.target.toLocaleString()}</span>
                    <span style={{fontSize:8,color:a.unlocked?RM.color:T.muted,fontWeight:700}}>{a.unlocked?"✓ DONE":`${prog}%`}</span>
                  </div>
                </div>
              );
            })}
          </div>
          {sorted.length===0&&(
            <div className="glass" style={{padding:24,textAlign:"center",color:T.muted,borderRadius:16,gridColumn:"1/-1"}}>
              No achievements in this category yet
            </div>
          )}
        </div>
      </div>
    );
  }

          {filtered.length===0&&<div className="glass" style={{padding:20,textAlign:"center",color:T.muted,borderRadius:16,fontSize:fs-1}}>No transactions</div>}

                <div key={e.id} className="glass" style={{padding:"11px 13px",borderRadius:14,display:"flex",alignItems:"center",gap:10}}>

        </div>
      </div>

  /* ── TASKS — EISENHOWER MATRIX ──────────────────────────────── */
  function Tasks() {
    const QUADS=[
      {id:"do",      label:"Do First",    sub:"Urgent + Important",    emoji:"🔥", color:"#ef4444", desc:"Crisis, deadlines, emergencies"},
      {id:"schedule",label:"Schedule",    sub:"Not Urgent + Important", emoji:"📅", color:"#3b82f6", desc:"Planning, relationships, growth"},
      {id:"delegate",label:"Delegate",    sub:"Urgent + Not Important", emoji:"🤝", color:"#f59e0b", desc:"Interruptions, some meetings"},
      {id:"eliminate",label:"Eliminate",  sub:"Not Urgent + Not Important",emoji:"🗑️",color:"#6b7280",desc:"Trivial busy-work, time-wasters"},
    ];
    const [showForm,setShowForm]=useState(false);
    const [dragId,setDragId]=useState(null);
    const [dragOver,setDragOver]=useState(null);
    const [filterDone,setFilterDone]=useState(false);
    const [form,setForm]=useState({title:"",notes:"",quadrant:"do",priority:"medium",dueDate:""});
    const [editId,setEditId]=useState(null);

    const addTask=()=>{
      if(!form.title.trim())return;
      if(editId){
        setTasks(prev=>prev.map(t=>t.id===editId?{...t,...form}:t));
        showToast("Task updated ✓");setEditId(null);
      } else {
        setTasks(prev=>[...prev,{...form,id:Date.now(),done:false,createdAt:today}]);
        showToast("Task added 📋");
      }
      setForm({title:"",notes:"",quadrant:"do",priority:"medium",dueDate:""});
      setShowForm(false);
    };

    const toggleDone=(id)=>setTasks(prev=>prev.map(t=>t.id===id?{...t,done:!t.done}:t));
    const deleteTask=(id)=>setTasks(prev=>prev.filter(t=>t.id!==id));
    const startEdit=(t)=>{setForm({title:t.title,notes:t.notes||"",quadrant:t.quadrant,priority:t.priority||"medium",dueDate:t.dueDate||""});setEditId(t.id);setShowForm(true);};
    const moveTask=(id,qid)=>setTasks(prev=>prev.map(t=>t.id===id?{...t,quadrant:qid}:t));

    const PRIORITY_COLORS={high:"#ef4444",medium:"#f59e0b",low:"#22c55e"};
    const totalTasks=tasks.length;
    const doneTasks=tasks.filter(t=>t.done).length;

    return(
      <div className="page stagger">
        {/* Header */}
        <div style={{padding:"24px 20px 10px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:fs+7,fontWeight:900,letterSpacing:"-0.04em",color:T.text}}>Matrix 🎯</div>
            <div style={{fontSize:fs-2,color:T.muted,marginTop:3}}>Eisenhower Priority Matrix</div>
          </div>
          <div style={{display:"flex",gap:7,alignItems:"center"}}>
            <button onClick={()=>setFilterDone(v=>!v)} className="bp" style={{padding:"6px 11px",borderRadius:10,background:filterDone?`${T.accent}22`:T.glass,border:`1px solid ${filterDone?T.accent+"55":T.border}`,color:filterDone?T.accent:T.muted,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>
              {filterDone?"Show All":"Hide Done"}
            </button>
            <button onClick={()=>{setEditId(null);setForm({title:"",notes:"",quadrant:"do",priority:"medium",dueDate:""});setShowForm(true);}} className="bp" style={{padding:"8px 14px",borderRadius:11,background:`linear-gradient(135deg,${T.accent},${T.accent}bb)`,border:"none",color:"#000",fontSize:fs-2,fontWeight:700,cursor:"pointer"}}>+ Task</button>
          </div>
        </div>

        {/* Progress bar */}
        {totalTasks>0&&(
          <div style={{padding:"0 20px 14px"}}>
            <div className="glass2" style={{padding:"12px 16px",borderRadius:18,display:"flex",alignItems:"center",gap:14}}>
              <div style={{position:"relative",flexShrink:0,display:"inline-flex",alignItems:"center",justifyContent:"center"}}>
                <Ring pct={totalTasks?Math.round(doneTasks/totalTasks*100):0} size={52} sw={5} color={T.accent}/>
                <div style={{position:"absolute",fontSize:11,fontWeight:800,color:T.accent}}>{totalTasks?Math.round(doneTasks/totalTasks*100):0}%</div>
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:fs,color:T.text}}>{doneTasks} of {totalTasks} tasks done</div>
                <div style={{height:4,background:T.glass,borderRadius:2,overflow:"hidden",marginTop:6}}>
                  <div style={{height:"100%",width:`${totalTasks?Math.round(doneTasks/totalTasks*100):0}%`,background:`linear-gradient(90deg,${T.accent},${T.accent2})`,borderRadius:2,transition:"width .6s"}}/>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Add/Edit form */}
        {showForm&&(
          <div style={{padding:"0 20px 14px"}} className="su">
            <div className="glass" style={{padding:16,borderRadius:18,border:`1px solid ${T.accent}28`}}>
              <div style={{fontWeight:700,fontSize:fs+1,marginBottom:13,color:T.text}}>{editId?"Edit Task ✏️":"New Task 📋"}</div>
              <label style={lbl}>Task Title *</label>
              <input style={{...inp,marginBottom:11,fontWeight:600}} value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addTask()} placeholder="What needs to be done?"/>
              <label style={lbl}>Notes</label>
              <input style={{...inp,marginBottom:11}} value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Optional details..."/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:11}}>
                <div>
                  <label style={lbl}>Quadrant</label>
                  <select style={inp} value={form.quadrant} onChange={e=>setForm(f=>({...f,quadrant:e.target.value}))}>
                    {QUADS.map(q=><option key={q.id} value={q.id}>{q.emoji} {q.label}</option>)}
                  </select>
                </div>
                <div>
                  <label style={lbl}>Priority</label>
                  <select style={inp} value={form.priority} onChange={e=>setForm(f=>({...f,priority:e.target.value}))}>
                    <option value="high">🔴 High</option>
                    <option value="medium">🟡 Medium</option>
                    <option value="low">🟢 Low</option>
                  </select>
                </div>
              </div>
              <label style={lbl}>Due Date</label>
              <input type="date" style={{...inp,marginBottom:14}} value={form.dueDate} onChange={e=>setForm(f=>({...f,dueDate:e.target.value}))}/>
              <div style={{display:"flex",gap:8}}>
                <button onClick={addTask} className="bp" style={{flex:1,padding:"11px",borderRadius:12,background:`linear-gradient(135deg,${T.accent},${T.accent}bb)`,border:"none",color:"#000",fontWeight:800,fontSize:fs-1,cursor:"pointer"}}>{editId?"Update":"Add Task"}</button>
                <button onClick={()=>{setShowForm(false);setEditId(null);}} className="bp glass" style={{padding:"11px 14px",borderRadius:12,border:`1px solid ${T.border}`,color:T.muted,cursor:"pointer",background:T.glass}}>✕</button>
              </div>
            </div>
          </div>
        )}

        {/* Eisenhower 2×2 matrix legend */}
        <div style={{padding:"0 20px 6px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:2,borderRadius:16,overflow:"hidden",border:`1px solid ${T.border}`}}>
            {/* Axis labels */}
            <div style={{gridColumn:"1/-1",display:"grid",gridTemplateColumns:"28px 1fr 1fr",background:T.glass,padding:"4px 0"}}>
              <div/>
              <div style={{textAlign:"center",fontSize:9,fontWeight:700,color:"#ef4444",letterSpacing:"0.08em",textTransform:"uppercase"}}>URGENT</div>
              <div style={{textAlign:"center",fontSize:9,fontWeight:700,color:"#6b7280",letterSpacing:"0.08em",textTransform:"uppercase"}}>NOT URGENT</div>
            </div>
            {[
              {qRow:["do","schedule"],label:"IMPORTANT"},
              {qRow:["delegate","eliminate"],label:"NOT IMPORTANT"},
            ].map(({qRow,label},ri)=>(
              <div key={ri} style={{gridColumn:"1/-1",display:"grid",gridTemplateColumns:"28px 1fr 1fr"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",background:T.glass,writingMode:"vertical-rl",textOrientation:"mixed",transform:"rotate(180deg)",fontSize:8,fontWeight:700,color:ri===0?"#3b82f6":"#6b7280",letterSpacing:"0.08em",textTransform:"uppercase",padding:"8px 2px"}}>{label}</div>
                {qRow.map(qid=>{
                  const Q=QUADS.find(q=>q.id===qid);
                  const qTasks=tasks.filter(t=>t.quadrant===qid&&(filterDone?!t.done:true));
                  return(
                    <div key={qid}
                      onDragOver={e=>{e.preventDefault();setDragOver(qid);}}
                      onDrop={e=>{e.preventDefault();if(dragId)moveTask(dragId,qid);setDragId(null);setDragOver(null);}}
                      style={{
                        minHeight:120,padding:"8px 8px 6px",
                        background:dragOver===qid?`${Q.color}14`:T.glass,
                        borderLeft:`1px solid ${T.border}`,
                        borderTop:ri===1?`1px solid ${T.border}`:"none",
                        transition:"background .2s",
                      }}>
                      {/* Quadrant header */}
                      <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:6}}>
                        <span style={{fontSize:14}}>{Q.emoji}</span>
                        <div>
                          <div style={{fontSize:9,fontWeight:800,color:Q.color,textTransform:"uppercase",letterSpacing:"0.06em"}}>{Q.label}</div>
                          <div style={{fontSize:7,color:T.muted}}>{Q.desc}</div>
                        </div>
                      </div>
                      {/* Tasks in quadrant */}
                      {qTasks.length===0&&<div style={{fontSize:9,color:T.muted,textAlign:"center",padding:"8px 0",opacity:0.5}}>Drop here</div>}
                      {qTasks.map(t=>(
                        <div key={t.id} draggable
                          onDragStart={()=>setDragId(t.id)}
                          onDragEnd={()=>{setDragId(null);setDragOver(null);}}
                          style={{
                            padding:"7px 8px",borderRadius:9,marginBottom:5,
                            background:t.done?`${Q.color}08`:`${Q.color}14`,
                            border:`1px solid ${t.done?T.border:Q.color+"33"}`,
                            opacity:t.done?0.55:1,cursor:"grab",transition:"all .18s",
                          }}>
                          <div style={{display:"flex",alignItems:"flex-start",gap:5}}>
                            <button onClick={()=>toggleDone(t.id)} style={{width:14,height:14,borderRadius:4,border:`1.5px solid ${t.done?Q.color:T.muted}`,background:t.done?Q.color:"transparent",cursor:"pointer",flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>
                              {t.done&&<span style={{fontSize:8,color:"#000",fontWeight:900}}>✓</span>}
                            </button>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:10,fontWeight:600,color:T.text,textDecoration:t.done?"line-through":"none",lineHeight:1.3,wordBreak:"break-word"}}>{t.title}</div>
                              {t.dueDate&&<div style={{fontSize:8,color:new Date(t.dueDate)<new Date()&&!t.done?"#ef4444":T.muted,marginTop:1}}>📅 {fmtDate(t.dueDate)}{new Date(t.dueDate)<new Date()&&!t.done?" ⚠️":""}</div>}
                              {t.notes&&<div style={{fontSize:8,color:T.muted,marginTop:1,fontStyle:"italic"}}>{t.notes}</div>}
                            </div>
                            <div style={{display:"flex",flexDirection:"column",gap:2,flexShrink:0}}>
                              <div style={{width:5,height:5,borderRadius:"50%",background:PRIORITY_COLORS[t.priority||"medium"]}}/>
                              <button onClick={()=>startEdit(t)} style={{background:"none",border:"none",cursor:"pointer",fontSize:8,color:T.muted,padding:0,lineHeight:1}}>✏️</button>
                              <button onClick={()=>deleteTask(t.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:8,color:T.muted,padding:0,lineHeight:1}}>✕</button>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>

        {/* Legend */}
        <div style={{padding:"10px 20px 0"}}>
          <div className="glass" style={{padding:"12px 14px",borderRadius:14}}>
            <div style={{fontSize:9,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Quadrant Guide</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
              {QUADS.map(q=>(
                <div key={q.id} style={{display:"flex",alignItems:"flex-start",gap:7}}>
                  <div style={{width:24,height:24,borderRadius:7,background:`${q.color}22`,border:`1px solid ${q.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0}}>{q.emoji}</div>
                  <div>
                    <div style={{fontSize:10,fontWeight:700,color:q.color}}>{q.label}</div>
                    <div style={{fontSize:8,color:T.muted,lineHeight:1.4}}>{q.sub}</div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{marginTop:10,fontSize:9,color:T.muted,fontStyle:"italic",lineHeight:1.5}}>
              💡 Drag tasks between quadrants to reprioritize. Tap ✏️ to edit. Overdue tasks show ⚠️
            </div>
          </div>
        </div>

        {/* Done tasks summary */}
        {doneTasks>0&&(
          <div style={{padding:"10px 20px 0"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontSize:10,color:T.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.07em"}}>✅ Completed ({doneTasks})</div>
              <button onClick={()=>setTasks(prev=>prev.filter(t=>!t.done))} className="bp" style={{fontSize:10,color:T.accent3,background:"none",border:"none",cursor:"pointer",fontFamily:"'Outfit',sans-serif",fontWeight:600}}>Clear All Done</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  /* ── RESET MODAL ─────────────────────────────────────────────── */
  function ResetModal() {
    const [confirm,setConfirm]=useState("");
    return(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:500,backdropFilter:"blur(16px)",padding:"20px"}} onClick={()=>setShowReset(false)}>
        <div className="su" style={{background:T.surface,borderRadius:24,padding:"28px 24px",width:"100%",maxWidth:380,border:`1px solid ${T.border}`}} onClick={e=>e.stopPropagation()}>
          <div style={{textAlign:"center",marginBottom:20}}>
            <div style={{fontSize:44,marginBottom:10}}>⚠️</div>
            <div style={{fontSize:fs+5,fontWeight:900,color:T.text,letterSpacing:"-0.03em",marginBottom:6}}>Reset App Data</div>
            <div style={{fontSize:fs-1,color:T.muted,lineHeight:1.6}}>Choose what to reset. This cannot be undone.</div>
          </div>

          {/* Option 1: Reset Achievements only */}
          <div className="glass" style={{padding:"14px 16px",borderRadius:16,marginBottom:10,border:`1px solid ${T.accent}22`}}>
            <div style={{fontWeight:700,fontSize:fs,color:T.text,marginBottom:4}}>🏆 Reset Achievements Only</div>
            <div style={{fontSize:fs-2,color:T.muted,marginBottom:10}}>Clears all achievement progress and unlocks. Habits, expenses, journal and other data stay intact.</div>
            <button onClick={resetAchievements} className="bp" style={{width:"100%",padding:"10px",borderRadius:11,background:`${T.accent}22`,border:`1px solid ${T.accent}44`,color:T.accent,fontWeight:700,fontSize:fs-1,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>
              Reset Achievements
            </button>
          </div>

          {/* Option 2: Full reset with confirmation */}
          <div className="glass" style={{padding:"14px 16px",borderRadius:16,border:`1px solid ${T.accent3}22`}}>
            <div style={{fontWeight:700,fontSize:fs,color:T.accent3,marginBottom:4}}>💥 Full App Reset</div>
            <div style={{fontSize:fs-2,color:T.muted,marginBottom:10}}>Deletes ALL data — habits, logs, streaks, achievements, journal, expenses, tasks, everything. App restarts fresh.</div>
            <div style={{fontSize:fs-3,color:T.muted,marginBottom:6}}>Type <span style={{color:T.accent3,fontWeight:700}}>RESET</span> to confirm:</div>
            <input value={confirm} onChange={e=>setConfirm(e.target.value)} placeholder="Type RESET here..." style={{...inp,marginBottom:10,borderColor:confirm==="RESET"?`${T.accent3}66`:undefined}}/>
            <button onClick={resetAll} disabled={confirm!=="RESET"} className="bp" style={{width:"100%",padding:"10px",borderRadius:11,background:confirm==="RESET"?`linear-gradient(135deg,#ef4444,#dc2626)`:`${T.accent3}10`,border:`1px solid ${confirm==="RESET"?"#ef444488":T.accent3+"22"}`,color:confirm==="RESET"?"#fff":T.muted,fontWeight:700,fontSize:fs-1,cursor:confirm==="RESET"?"pointer":"not-allowed",fontFamily:"'Outfit',sans-serif",transition:"all .2s"}}>
              {confirm==="RESET"?"⚠️ Wipe Everything & Restart":"Enter RESET to enable"}
            </button>
          </div>

          <button onClick={()=>setShowReset(false)} className="bp" style={{width:"100%",marginTop:12,padding:"10px",borderRadius:11,background:T.glass,border:`1px solid ${T.border}`,color:T.muted,fontWeight:600,fontSize:fs-1,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>Cancel</button>
        </div>
      </div>
    );
  }
  const NAV=[
    {id:"dashboard",emoji:"🏠",label:"Home"},
    {id:"analytics",emoji:"📊",label:"Stats"},
    {id:"focus",    emoji:"⏱️",label:"Focus"},
    {id:"journal",  emoji:"📝",label:"Journal"},
    {id:"tasks",    emoji:"🎯",label:"Matrix"},
    {id:"goals",    emoji:"🚀",label:"Goals"},
    {id:"wins",     emoji:"🏆",label:"Wins"},
    {id:"spend",    emoji:"💸",label:"Spend"},
  ];

  const PAGES={dashboard:<Dashboard key="dashboard"/>,analytics:<Analytics key="analytics"/>,focus:<FocusTimer key="focus"/>,journal:<Journal key="journal"/>,tasks:<Tasks key="tasks"/>,goals:<Goals key="goals"/>,wins:<Wins key="wins"/>,spend:<Spend key="spend"/>};

  return(
    <>
      <GS theme={theme}/>
      <div className="root" style={{filter:`brightness(${brightness}%) saturate(${saturation}%)`,height:"100dvh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div className="orb1"/>
        <div className="orb2"/>

        {/* Scrollable page area */}
        <div ref={scrollRef} style={{flex:1,overflowY:"auto",overflowX:"hidden",WebkitOverflowScrolling:"touch"}}>
          {PAGES[page]||<Dashboard/>}
        </div>

        {/* Scrollable bottom nav */}
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,zIndex:100}}>
          <div style={{margin:"0 10px 10px",background:T.nav,backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",border:`1px solid ${T.border}`,borderRadius:20,padding:"8px 4px",display:"flex",overflowX:"auto",gap:2}}>
            {NAV.map(n=>{
              const a=page===n.id;
              return(
                <button key={n.id} onClick={()=>setPage(n.id)} className={`bp${page===n.id?" nav-active":""}`} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",color:a?T.text:T.muted,background:a?`${T.accent}25`:"transparent",border:a?`1px solid ${T.accent}38`:"1px solid transparent",borderRadius:13,padding:"6px 10px",transition:"all .18s",minWidth:52,flexShrink:0,fontFamily:"'Outfit',sans-serif"}}>
                  <span style={{fontSize:17}}>{n.emoji}</span>
                  <span style={{fontSize:8,fontWeight:a?700:500,letterSpacing:"0.04em",textTransform:"uppercase",whiteSpace:"nowrap"}}>{n.label}</span>
                </button>
              );
            })}
          </div>
        </div>

        {/* Toast */}
        {toast&&(
          <div style={{position:"fixed",top:18,left:"50%",transform:"translateX(-50%)",background:T.surface,border:`1px solid ${T.accent}44`,color:T.text,padding:"9px 18px",borderRadius:13,fontSize:fs-1,fontWeight:600,zIndex:400,boxShadow:"0 8px 32px rgba(0,0,0,0.5)",backdropFilter:"blur(20px)",whiteSpace:"nowrap"}} className="toast-in">
            {toast}
          </div>
        )}

        {modal?.type==="habit"&&<HabitModal/>}
        {showUI&&<UICustomizer/>}
        {showReset&&<ResetModal/>}
      </div>
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE = 'triad-v1';
        self.addEventListener('install', e => {
          e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
        });
        self.addEventListener('fetch', e => {
          e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('/'))));
        });
      `;
      const blob = new Blob([swCode], {type: 'application/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(blob));
    }
  </script>
</body>
</html>
